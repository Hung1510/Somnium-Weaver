name: release

# tag a commit like v0.1.0 and push it -> this builds a self-contained
# single-file exe and attaches the zip to a github release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: publish
        run: >
          dotnet publish SomniumWeaver.csproj -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: zip
        run: Compress-Archive -Path publish/* -DestinationPath SomniumWeaver-${{ github.ref_name }}-win-x64.zip

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: SomniumWeaver-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
